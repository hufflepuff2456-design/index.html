<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>défaite d'amour</title>


  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Your green theme */
      --bg: #07130a;
      --panel: #0e1a12;
      --text: #eaf7ef;
      --muted: #a7c7b1;
      --line: #12301d;
    }
    * { box-sizing: border-box; }
    body{
      margin: 0; padding: 24px;
      color: var(--text);
      background: radial-gradient(1000px 600px at 30% -10%, #0c1d13, var(--bg));
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      display: grid; place-items: center; gap: 14px;
    }

    h1{
      margin: 0 0 6px 0;
      font-family: "Great Vibes", 
      font-weight: 400;
      font-size: clamp(40px, 10vw, 84px);
      line-height: 1;
      text-align: center;
      letter-spacing: .4px;
      color: var(--text);
      text-shadow: 0 2px 20px rgba(0,0,0,.25);
    }

    .subtitle{
      margin: 0 0 18px 0;
      text-align: center;
      color: var(--muted);
      font-size: clamp(14px, 2.6vw, 18px);
    }

    .frame{
      width: min(92vmin, 820px);
      aspect-ratio: 4 / 3;
      border-radius: 14px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(0,0,0,.35);
    }
    .frame > iframe{
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .hint{
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <h1>défaite d'amour</h1>
  <p class="subtitle">pièce après pièce</p>

  <div class="frame">
    <iframe
      src="https://fritz.chessbase.com"
      title="Play against the chess engine"
      allow="fullscreen"
      loading="lazy">
    </iframe>
  </div>

  <!-- UPDATED LINE -->
  <p class="hint">tip: try to not lose – zai</p>

</body>
</html>
